---
name: Update Python Dependencies
on:
  schedule:
    # First Monday of each month at 8am ET (12:00 UTC)
    - cron: "0 12 1-7 * 1"
  workflow_dispatch:

jobs:
  update-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.DEPENDENCY_UPDATE_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Compile updated requirements
        run: |
          pip-compile --upgrade --output-file=requirements.txt requirements.in
          pip-compile --upgrade --output-file=requirements-dev.txt requirements-dev.in

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.DEPENDENCY_UPDATE_PAT }}
          PR_BODY: |
            ## Summary
            Automated monthly update of pinned Python dependencies.

            - Generated by `pip-compile --upgrade` against `requirements.in` and `requirements-dev.in`
            - Molecule tests run automatically on this PR to validate compatibility

            ## Test plan
            - [ ] Molecule tests pass on this PR
            - [ ] Review updated package versions for any breaking changes
        run: |
          BRANCH="deps/update-requirements-$(date +%Y%m)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add requirements.txt requirements-dev.txt
          git commit -m "chore: update Python dependencies $(date +%Y-%m)"
          git push --force-with-lease origin "$BRANCH"

          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --title "chore: update Python dependencies $(date +%B %Y)" \
              --body "$PR_BODY" \
              --base master \
              --label dependencies
          else
            echo "PR #$EXISTING already exists for $BRANCH, updated via force push"
          fi
